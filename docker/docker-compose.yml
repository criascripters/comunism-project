# Base docker-compose file
# Use docker-compose.dev.yml for development or docker-compose.prod.yml for production
# 
# Development: docker-compose -f docker/docker-compose.dev.yml up
# Production:  docker-compose -f docker/docker-compose.prod.yml up

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "5122:5122"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-comunism}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
    driver: local

networks:
  default:
    driver: bridge