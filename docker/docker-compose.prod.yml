name: comunism-prod

services:
  backend:
    container_name: comunism-backend-prod
    image: comunism-backend:prod
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    ports:
      - "5122:5122"
    env_file:
      - ../backend/.env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    container_name: comunism-frontend-prod
    image: comunism-frontend:prod
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  db:
    container_name: comunism-db-prod
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-comunism_prod}
    ports:
      - "5432:5432"
    volumes:
      - db-data-prod:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data-prod:
    driver: local

networks:
  default:
    driver: bridge
